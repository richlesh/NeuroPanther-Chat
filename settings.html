<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 24px;
      column-count: 2;
      column-gap: 24px;
    }
    
    body > div {
      break-inside: avoid;
      margin-bottom: 8px;
    }

    h1 { font-size: 16px; font-weight: 600; margin-top: 16px; margin-bottom: 16px; }

    .buttons-row {
      column-span: all;
      margin-top: 8px;
    }

    label { display: block; font-size: 14px; color: #aaa; margin-bottom: 4px; }

    select, input {
      width: 100%;
      background: #3a3a3c;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }
    select:focus, input:focus { border-color: #0a84ff; }

    .row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

    button {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    #cancel-btn { background: #3a3a3c; color: #e0e0e0; }
    #save-btn   { background: #0a84ff; color: #fff; }
    #api-key-link { font-size: 14px; color: #4da3ff; text-decoration: none; margin-top: 4px; display: inline-block; }
    #api-key-link:hover { text-decoration: underline; }
    .section-title { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; padding-top: 12px; padding-bottom: 12px; }
    .dir-row { display: flex; gap: 8px; align-items: center; }
    .dir-row input { flex: 1; }
    .dir-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #3a3a3c; color: #e0e0e0; cursor: pointer; font-size: 14px; white-space: nowrap; flex-shrink: 0; }
    .dir-btn:hover { background: #4a4a4e; }
    #api-key-section[style*="display: none"] { display: none !important; position: absolute; }
  </style>
</head>
<body>
  <h1>LLM Settings</h1>
  <div>
    <label>Vendor</label>
    <select id="vendor"></select>
  </div>
  <div>
    <label>Model</label>
    <select id="model"></select>
  </div>
  <div id="api-key-section">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="Enter API key…">
    <a id="api-key-link" href="#" target="_blank">Get API key…</a>
    <span id="api-key-note" style="font-size: 11px; color: #888; margin-left: 6px; display: none;">(only required for cloud models)</span>
  </div>
  <div id="microsoft-section" style="display:none;">
    <label>API Key</label>
    <input id="microsoft-api-key" type="password" placeholder="Enter Azure OpenAI API key…">
    <label style="margin-top:8px;">Endpoint URL</label>
    <input id="microsoft-endpoint" type="text" placeholder="https://your-resource.openai.azure.com">
    <a id="microsoft-key-link" href="#" target="_blank" style="font-size:14px;color:#4da3ff;text-decoration:none;margin-top:4px;display:inline-block;">Get Azure OpenAI credentials…</a>
  </div>
  <div id="amazon-section" style="display:none;">
    <label>AWS Access Key ID</label>
    <input id="amazon-access-key" type="password" placeholder="Enter AWS Access Key ID…">
    <label style="margin-top:8px;">AWS Secret Access Key</label>
    <input id="amazon-secret-key" type="password" placeholder="Enter AWS Secret Access Key…">
    <label style="margin-top:8px;">AWS Region</label>
    <input id="amazon-region" type="text" placeholder="us-east-1">
    <a id="amazon-key-link" href="#" target="_blank" style="font-size:14px;color:#4da3ff;text-decoration:none;margin-top:4px;display:inline-block;">Get AWS credentials…</a>
  </div>
  <div id="ibm-section" style="display:none;">
    <label>IBM Cloud API Key</label>
    <input id="ibm-api-key" type="password" placeholder="Enter IBM Cloud API key…">
    <label style="margin-top:8px;">Endpoint URL</label>
    <input id="ibm-endpoint" type="text" placeholder="https://us-south.ml.cloud.ibm.com">
    <label style="margin-top:8px;">Project ID</label>
    <input id="ibm-project-id" type="text" placeholder="Enter project ID…">
    <a id="ibm-key-link" href="#" target="_blank" style="font-size:14px;color:#4da3ff;text-decoration:none;margin-top:4px;display:inline-block;">Get IBM Cloud API key…</a>
  </div>
  <div id="generic-section" style="display:none;">
    <label>API Key</label>
    <input id="generic-api-key" type="password" placeholder="Enter API key…">
    <label style="margin-top:8px;">Endpoint URL</label>
    <input id="generic-endpoint" type="text" placeholder="https://api.example.com/v1">
  </div>

  <!-- Agent Settings -->
  <h1>Agent Settings</h1>
  <div>
    <label>Working Directory</label>
    <div class="dir-row">
      <input id="working-dir" type="text" placeholder="No directory selected…" readonly>
      <button class="dir-btn" id="browse-dir-btn">Browse…</button>
    </div>
  </div>
  <div>
    <label>Brave Search API Key</label>
    <input id="brave-api-key" type="password" placeholder="Enter Brave Search API key…">
    <a id="brave-key-link" href="https://api.search.brave.com" style="font-size:14px;color:#4da3ff;text-decoration:none;margin-top:4px;display:inline-block;">Get API key…</a>
  </div>
<h1 style="break-before:column;">
  <!-- Translation Settings -->
  <h1>Translation Settings</h1>
  <div>
    <label>Default Response Language</label>
    <select id="default-to-lang"></select>
  </div>

  <!-- Speech Settings -->
  <h1>Speech Settings</h1>
  <div>
    <label>TTS Voice</label>
    <select id="tts-voice"></select>
  </div>

  <!-- Display Settings -->
  <h1>Display Settings</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <input type="checkbox" id="display-model-activity" style="width:auto;margin:0;">
    <label for="display-model-activity" style="margin:0;cursor:pointer;">Display Model Activity</label>
  </div>

  <!-- Font Settings -->
  <div class="section-title">Fonts</div>
  <div style="display:flex;gap:12px;">
    <div style="flex:2">
      <label>Text Font</label>
      <select id="text-font"></select>
    </div>
    <div style="flex:1">
      <label>Size</label>
      <select id="text-font-size"></select>
    </div>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px;">
    <div style="flex:2">
      <label>Code Font</label>
      <select id="code-font"></select>
    </div>
    <div style="flex:1">
      <label>Size</label>
      <select id="code-font-size"></select>
    </div>
  </div>

  <!-- Color Settings -->
  <div class="section-title">Colors</div>
  <div style="display:flex;gap:12px;">
    <div style="flex:1">
      <label>Button Highlight</label>
      <input type="color" id="accent-color" style="height:36px;padding:2px 4px;">
    </div>
    <div style="flex:1">
      <label>User Prompt</label>
      <input type="color" id="user-bubble-color" style="height:36px;padding:2px 4px;">
    </div>
    <div style="flex:1">
      <label>AI Response</label>
      <input type="color" id="ai-bubble-color" style="height:36px;padding:2px 4px;">
    </div>
  </div>

  <div class="row buttons-row">
    <button id="cancel-btn">Cancel</button>
    <button id="save-btn">Save</button>
  </div>
</div>
  <script>
    const { ipcRenderer } = require("electron");

    const vendorSel = document.getElementById("vendor");
    const modelSel  = document.getElementById("model");
    const apiKeyIn  = document.getElementById("apiKey");
    const apiKeyLink = document.getElementById("api-key-link");

    let vendors, current;

    ipcRenderer.invoke("settings-get-data").then(async ({ settings, VENDORS }) => {
      vendors = VENDORS;
      current = settings;
      if (!current.defaultModels) current.defaultModels = {};

      for (const [key, v] of Object.entries(vendors).sort((a, b) => a[1].label.localeCompare(b[1].label))) {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = v.label;
        vendorSel.appendChild(opt);
      }

      vendorSel.value = current.vendor;
      vendorSel.dataset.prev = current.vendor;
      await populateModels(current.vendor, current.defaultModels[current.vendor] || current.model);
      apiKeyIn.value = current.apiKeys[current.vendor] || "";
      updateLink(current.vendor);

      document.getElementById("working-dir").value = current.workingDir || "";
      document.getElementById("brave-api-key").value = current.apiKeys["brave"] || "";
      document.getElementById("accent-color").value      = current.accentColor    || "#5cda05";
      document.getElementById("user-bubble-color").value = current.userBubbleColor || "#5cda05";
      document.getElementById("ai-bubble-color").value   = current.aiBubbleColor   || "#2c2c2e";

      const LANGUAGES = [
        "Afrikaans","Arabic","Bengali","Bulgarian","Catalan","Chinese (Simplified)",
        "Chinese (Traditional)","Croatian","Czech","Danish","Dutch","English",
        "Estonian","Finnish","French","German","Greek","Gujarati","Hebrew","Hindi",
        "Hungarian","Indonesian","Italian","Japanese","Kannada","Korean","Latvian",
        "Lithuanian","Malay","Malayalam","Marathi","Norwegian","Persian","Polish",
        "Portuguese","Punjabi","Romanian","Russian","Serbian","Slovak","Slovenian",
        "Spanish","Swahili","Swedish","Tamil","Telugu","Thai","Turkish","Ukrainian",
        "Urdu","Vietnamese"
      ];
      const toSel = document.getElementById("default-to-lang");
      LANGUAGES.forEach(lang => {
        toSel.append(Object.assign(document.createElement("option"), { value: lang, textContent: lang }));
      });
      toSel.value = current.defaultToLang || "English";

      document.getElementById("display-model-activity").checked = current.displayModelActivity !== false;

      // Populate font selectors
      const textFontSel = document.getElementById("text-font");
      const codeFontSel = document.getElementById("code-font");
      const textFontSizeSel = document.getElementById("text-font-size");
      const codeFontSizeSel = document.getElementById("code-font-size");

      const allFonts = [];
      const monoFonts = [];
      (function detectFonts() {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const testStr = "mmmmmmmmmmlli";
        const defaultWidth = (f) => { ctx.font = `16px ${f}`; return ctx.measureText(testStr).width; };
        const sansWidth = defaultWidth("sans-serif");
        const serifWidth = defaultWidth("serif");
        const monoWidth = defaultWidth("monospace");
        const candidates = [
          "Arial","Arial Black","Avenir","Avenir Next","Baskerville","Bodoni 72",
          "Bookman Old Style","Calibri","Cambria","Cascadia Code","Cascadia Mono",
          "Century Gothic","Comic Sans MS","Consolas","Constantia","Courier New",
          "DejaVu Sans","DejaVu Sans Mono","Didot","Fira Code","Fira Mono","Fira Sans",
          "Futura","Garamond","Geneva","Georgia","Gill Sans","Hack","Helvetica",
          "Helvetica Neue","IBM Plex Mono","IBM Plex Sans","Impact","Inconsolata",
          "Inter","JetBrains Mono","Lato","Lucida Console","Lucida Grande",
          "Lucida Sans Unicode","Menlo","Monaco","Noto Sans","Noto Sans Mono",
          "Optima","Osaka","Palatino","Roboto","Roboto Mono","San Francisco",
          "SF Mono","SF Pro","Source Code Pro","Source Sans Pro","Tahoma","Times New Roman",
          "Trebuchet MS","Ubuntu","Ubuntu Mono","Verdana"
        ];
        for (const name of candidates) {
          ctx.font = `16px "${name}", sans-serif`;
          const w = ctx.measureText(testStr).width;
          if (w !== sansWidth || w !== serifWidth) {
            allFonts.push(name);
            // Check if monospaced
            ctx.font = `16px "${name}", monospace`;
            const wm = ctx.measureText(testStr).width;
            if (wm === monoWidth || Math.abs(wm - monoWidth) < 1) {
              monoFonts.push(name);
            }
          }
        }
        // Always include system defaults
        if (!allFonts.includes("System Default")) allFonts.unshift("System Default");
        if (!monoFonts.includes("System Default")) monoFonts.unshift("System Default");
      })();

      allFonts.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f === "System Default" ? "" : f;
        opt.textContent = f;
        opt.style.fontFamily = f === "System Default" ? "" : `"${f}"`;
        textFontSel.appendChild(opt);
      });
      monoFonts.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f === "System Default" ? "" : f;
        opt.textContent = f;
        opt.style.fontFamily = f === "System Default" ? "" : `"${f}"`;
        codeFontSel.appendChild(opt);
      });

      const sizes = [10, 11, 12, 13, 14, 15, 16, 18, 20, 22, 24];
      sizes.forEach(s => {
        const opt1 = document.createElement("option");
        opt1.value = s; opt1.textContent = s + "px";
        textFontSizeSel.appendChild(opt1);
        const opt2 = document.createElement("option");
        opt2.value = s; opt2.textContent = s + "px";
        codeFontSizeSel.appendChild(opt2);
      });

      textFontSel.value = current.textFont || "";
      textFontSizeSel.value = current.textFontSize || "14";
      codeFontSel.value = current.codeFont || "";
      codeFontSizeSel.value = current.codeFontSize || "13";

      // Populate TTS voices
      const ttsVoiceSel = document.getElementById("tts-voice");
      function populateVoices() {
        const voices = speechSynthesis.getVoices();
        ttsVoiceSel.innerHTML = "<option value=\"\">System Default</option>";
        voices.forEach(v => {
          const opt = document.createElement("option");
          opt.value = v.name;
          opt.textContent = `${v.name} (${v.lang})`;
          ttsVoiceSel.appendChild(opt);
        });
        if (current.ttsVoice) ttsVoiceSel.value = current.ttsVoice;
      }
      populateVoices();
      speechSynthesis.onvoiceschanged = populateVoices;
    });

    function updateLink(vendor) {
      const apiKeySection = document.getElementById("api-key-section");
      const amazonSection = document.getElementById("amazon-section");
      const microsoftSection = document.getElementById("microsoft-section");
      const ibmSection = document.getElementById("ibm-section");
      const genericSection = document.getElementById("generic-section");
      const apiKeyNote = document.getElementById("api-key-note");
      apiKeySection.style.display = "none";
      amazonSection.style.display = "none";
      microsoftSection.style.display = "none";
      ibmSection.style.display = "none";
      genericSection.style.display = "none";
      if (vendor === "amazon") {
        amazonSection.style.display = "";
        document.getElementById("amazon-access-key").value = current.apiKeys.amazonAccessKey || "";
        document.getElementById("amazon-secret-key").value = current.apiKeys.amazonSecretKey || "";
        document.getElementById("amazon-region").value = current.apiKeys.amazonRegion || "us-east-1";
        document.getElementById("amazon-key-link").href = vendors[vendor].apiKeyUrl || "#";
      } else if (vendor === "microsoft") {
        microsoftSection.style.display = "";
        document.getElementById("microsoft-api-key").value = current.apiKeys.microsoftApiKey || "";
        document.getElementById("microsoft-endpoint").value = current.apiKeys.microsoftEndpoint || "";
        document.getElementById("microsoft-key-link").href = vendors[vendor].apiKeyUrl || "#";
      } else if (vendor === "ibm") {
        ibmSection.style.display = "";
        document.getElementById("ibm-api-key").value = current.apiKeys.ibmApiKey || "";
        document.getElementById("ibm-endpoint").value = current.apiKeys.ibmEndpoint || "";
        document.getElementById("ibm-project-id").value = current.apiKeys.ibmProjectId || "";
        document.getElementById("ibm-key-link").href = vendors[vendor].apiKeyUrl || "#";
      } else if (vendor.startsWith("generic")) {
        genericSection.style.display = "";
        document.getElementById("generic-api-key").value = current.apiKeys[vendor + "ApiKey"] || "";
        document.getElementById("generic-endpoint").value = current.apiKeys[vendor + "Endpoint"] || "";
      } else {
        apiKeySection.style.display = "";
        apiKeyLink.href = vendors[vendor].apiKeyUrl || "#";
        apiKeyNote.style.display = vendor === "ollama" ? "inline" : "none";
      }
    }

    async function populateModels(vendor, savedModel) {
      modelSel.innerHTML = "<option disabled>Loading…</option>";
      let models = null;
      if (vendor === "ollama") {
        models = await ipcRenderer.invoke("get-models-for-vendor", "ollama");
      } else if (vendor === "amazon") {
        models = vendors[vendor].models;
      } else if (vendor === "microsoft") {
        const msKey = current.apiKeys.microsoftApiKey || "";
        const msEndpoint = current.apiKeys.microsoftEndpoint || "";
        if (msKey && msEndpoint) models = await ipcRenderer.invoke("get-models-for-vendor", "microsoft");
      } else if (vendor === "ibm") {
        const ibmKey = current.apiKeys.ibmApiKey || "";
        const ibmEndpoint = current.apiKeys.ibmEndpoint || "";
        if (ibmKey && ibmEndpoint) models = await ipcRenderer.invoke("get-models-for-vendor", "ibm");
      } else if (vendor.startsWith("generic")) {
        const gKey = current.apiKeys[vendor + "ApiKey"] || "";
        const gEndpoint = current.apiKeys[vendor + "Endpoint"] || "";
        if (gKey && gEndpoint) models = await ipcRenderer.invoke("fetch-models", { vendor, apiKey: gKey, baseURL: gEndpoint });
      } else {
        const apiKey = current.apiKeys[vendor] || "";
        if (apiKey) models = await ipcRenderer.invoke("fetch-models", { vendor, apiKey });
      }
      if (!models || models.length === 0) models = vendors[vendor].models;
      if (!models || models.length === 0) models = vendors[vendor].imageModels || [];
      modelSel.innerHTML = "";
      for (const m of [...models].sort((a, b) => a.localeCompare(b))) {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        modelSel.appendChild(opt);
      }
      if (savedModel && models.includes(savedModel)) modelSel.value = savedModel;
    }

    vendorSel.addEventListener("change", async () => {
      current.defaultModels[vendorSel.dataset.prev] = modelSel.value;
      // Save outgoing vendor's credentials
      const prev = vendorSel.dataset.prev;
      if (prev.startsWith("generic")) {
        current.apiKeys[prev + "ApiKey"]   = document.getElementById("generic-api-key").value;
        current.apiKeys[prev + "Endpoint"] = document.getElementById("generic-endpoint").value;
      } else if (prev === "microsoft") {
        current.apiKeys.microsoftApiKey   = document.getElementById("microsoft-api-key").value;
        current.apiKeys.microsoftEndpoint = document.getElementById("microsoft-endpoint").value;
      } else if (prev === "ibm") {
        current.apiKeys.ibmApiKey   = document.getElementById("ibm-api-key").value;
        current.apiKeys.ibmEndpoint = document.getElementById("ibm-endpoint").value;
        current.apiKeys.ibmProjectId = document.getElementById("ibm-project-id").value;
      } else if (prev === "amazon") {
        current.apiKeys.amazonAccessKey = document.getElementById("amazon-access-key").value;
        current.apiKeys.amazonSecretKey = document.getElementById("amazon-secret-key").value;
        current.apiKeys.amazonRegion    = document.getElementById("amazon-region").value;
      } else if (prev !== "ollama") {
        current.apiKeys[prev] = apiKeyIn.value;
      }
      if (vendorSel.value !== "amazon" && vendorSel.value !== "microsoft" && vendorSel.value !== "ibm" && !vendorSel.value.startsWith("generic")) {
        current.apiKeys[vendorSel.value] = current.apiKeys[vendorSel.value] || "";
        apiKeyIn.value = current.apiKeys[vendorSel.value];
      }
      updateLink(vendorSel.value);
      vendorSel.dataset.prev = vendorSel.value;
      await populateModels(vendorSel.value, current.defaultModels[vendorSel.value]);
    });

    modelSel.addEventListener("change", () => {
      current.defaultModels[vendorSel.value] = modelSel.value;
    });

    // re-fetch models when API key is changed
    let keyTimer;
    apiKeyIn.addEventListener("input", () => {
      current.apiKeys[vendorSel.value] = apiKeyIn.value;
      clearTimeout(keyTimer);
      keyTimer = setTimeout(() => populateModels(vendorSel.value), 800);
    });

    // re-fetch models when generic credentials change
    let genericTimer;
    document.getElementById("generic-api-key").addEventListener("input", () => {
      current.apiKeys[vendorSel.value + "ApiKey"] = document.getElementById("generic-api-key").value;
      clearTimeout(genericTimer);
      genericTimer = setTimeout(() => populateModels(vendorSel.value), 800);
    });
    document.getElementById("generic-endpoint").addEventListener("input", () => {
      current.apiKeys[vendorSel.value + "Endpoint"] = document.getElementById("generic-endpoint").value;
      clearTimeout(genericTimer);
      genericTimer = setTimeout(() => populateModels(vendorSel.value), 800);
    });

    apiKeyLink.addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", apiKeyLink.href);
    });

    document.getElementById("brave-key-link").addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", "https://api.search.brave.com");
    });

    document.getElementById("amazon-key-link").addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", document.getElementById("amazon-key-link").href);
    });

    document.getElementById("microsoft-key-link").addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", document.getElementById("microsoft-key-link").href);
    });

    document.getElementById("ibm-key-link").addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", document.getElementById("ibm-key-link").href);
    });

    document.getElementById("browse-dir-btn").addEventListener("click", async () => {
      const dir = await ipcRenderer.invoke("agent-browse-dir");
      if (dir) document.getElementById("working-dir").value = dir;
    });

    document.getElementById("save-btn").addEventListener("click", () => {
      if (vendorSel.value !== "amazon" && vendorSel.value !== "microsoft" && vendorSel.value !== "ibm" && !vendorSel.value.startsWith("generic")) current.apiKeys[vendorSel.value] = apiKeyIn.value;
      current.defaultModels[vendorSel.value] = modelSel.value;
      current.apiKeys["brave"] = document.getElementById("brave-api-key").value;
      // Persist credentials for the currently visible vendor section
      if (vendorSel.value === "amazon") {
        current.apiKeys.amazonAccessKey = document.getElementById("amazon-access-key").value;
        current.apiKeys.amazonSecretKey = document.getElementById("amazon-secret-key").value;
        current.apiKeys.amazonRegion    = document.getElementById("amazon-region").value || "us-east-1";
      } else if (vendorSel.value === "microsoft") {
        current.apiKeys.microsoftApiKey   = document.getElementById("microsoft-api-key").value;
        current.apiKeys.microsoftEndpoint = document.getElementById("microsoft-endpoint").value;
      } else if (vendorSel.value === "ibm") {
        current.apiKeys.ibmApiKey   = document.getElementById("ibm-api-key").value;
        current.apiKeys.ibmEndpoint = document.getElementById("ibm-endpoint").value;
        current.apiKeys.ibmProjectId = document.getElementById("ibm-project-id").value;
      } else if (vendorSel.value.startsWith("generic")) {
        current.apiKeys[vendorSel.value + "ApiKey"]   = document.getElementById("generic-api-key").value;
        current.apiKeys[vendorSel.value + "Endpoint"] = document.getElementById("generic-endpoint").value;
      }
      // Remove stale keys
      delete current.apiKeys.amazon;
      delete current.apiKeys.bedrock;
      delete current.apiKeys.microsoft;
      delete current.apiKeys.ibm;
      delete current.apiKeys.generic1;
      delete current.apiKeys.generic2;
      delete current.apiKeys.generic3;
      ipcRenderer.invoke("settings-save", {
        vendor: vendorSel.value,
        model: modelSel.value,
        apiKeys: current.apiKeys,
        defaultModels: current.defaultModels,
        workingDir: document.getElementById("working-dir").value,
        defaultToLang:    document.getElementById("default-to-lang").value,
        displayModelActivity: document.getElementById("display-model-activity").checked,
        ttsVoice:         document.getElementById("tts-voice").value,
        textFont:         document.getElementById("text-font").value,
        textFontSize:     document.getElementById("text-font-size").value,
        codeFont:         document.getElementById("code-font").value,
        codeFontSize:     document.getElementById("code-font-size").value,
        accentColor:      document.getElementById("accent-color").value,
        userBubbleColor:  document.getElementById("user-bubble-color").value,
        aiBubbleColor:    document.getElementById("ai-bubble-color").value
      });
    });

    document.getElementById("cancel-btn").addEventListener("click", () => {
      ipcRenderer.invoke("settings-cancel");
    });
  </script>
</body>
</html>
