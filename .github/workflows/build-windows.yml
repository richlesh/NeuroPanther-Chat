name: Build and Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v1.3.0)"
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows ${{ matrix.arch }} installer
        run: ./node_modules/.bin/electron-builder --win --${{ matrix.arch }} --publish never

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} `
            (Get-ChildItem dist\*.exe | Select-Object -ExpandProperty FullName) --clobber
        shell: powershell
